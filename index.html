<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital-abb Auto Repair Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Reliable Auto Repair, Done Faster</h1>
    <p>Get an instant repair estimate and priority booking in seconds.</p>
    <a href="#lead-form">Get My Instant Estimate</a>
  </header>

  <section>
    <h2>Services</h2>
    <ul>
      <li>Brake Repair</li>
      <li>Oil Change</li>
      <li>Engine Diagnostics</li>
      <li>Battery Replacement</li>
    </ul>
  </section>

  <section id="lead-form">
    <h2>Request Service</h2>

    <form>
      <input type="text" placeholder="Full Name" required />
      <input type="tel" placeholder="Phone Number" required />
      <input type="email" placeholder="Email Address" required />
      <input type="text" placeholder="Vehicle Year, Make, Model" required />
      <textarea placeholder="Describe the problem with your car" required></textarea>
      <button type="submit">Submit Request</button>
    </form>
  </section>

  <footer>
    <p>Powered by Digital-abb AI Automation</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
